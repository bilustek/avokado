repos:
  - repo: https://github.com/TekWizely/pre-commit-golang
    rev: v1.0.0-rc.1
    hooks:
      - id: golangci-lint-mod
        args: [--new=false]
      - id: go-mod-tidy
      - id: go-test-mod
        args: [-race, -failfast, -count=1]
  - repo: https://github.com/sbdchd/squawk
    rev: v2.44.0
    hooks:
      - id: squawk
        files: avokadodb/migrations/.*\.sql$
