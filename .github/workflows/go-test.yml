name: Run go tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

concurrency:
  group: avokado-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        go-version: ['1.26', 'stable']

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: avokado_test
          POSTGRES_PASSWORD: avokado_test
          POSTGRES_DB: avokado_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test -coverprofile=coverage.txt -race -failfast -count=1 ./...
        env:
          DATABASE_URL: postgres://avokado_test:avokado_test@localhost:5432/avokado_test?sslmode=disable

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN_PUBLIC }}
          slug: bilustek/avokado
