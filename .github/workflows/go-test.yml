name: Run go tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'

concurrency:
  group: avokado-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        go-version: ['1.26', 'stable']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test -coverprofile=coverage.txt -race -failfast -count=1 ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN_PUBLIC }}
          slug: bilustek/avokado
